# =============================================================================
# Admin user
# API key is read from .env using the variable named in api_key_env
# =============================================================================

[user]
name        = Admin
api_key_env = API_KEY_ADMIN
admin       = true

[rate_limits]
# Admin has no rate limits — leave blank to disable
per_minute  =
per_hour    =
per_day     =

[output]
# Leave all blank to inherit every setting from OutputConfig server defaults
geocentric        =
heliocentric      =
right_ascension   =
declination       =
longitude_speed   =
latitude_speed    =
declination_speed =
retrograde        =
default_house_system =

[output.angles]
asc        =
mc         =
vertex     =
east_point =
armc       =

[output.bodies]
sun              =
moon             =
mercury          =
venus            =
mars             =
jupiter          =
saturn           =
uranus           =
neptune          =
pluto            =
earth            =
asteroids        =
ceres            =
pallas           =
juno             =
vesta            =
chiron           =
mean_node        =
true_node        =
south_node       =
part_of_fortune  =

[output.meta]
api_usage  =
from_cache =